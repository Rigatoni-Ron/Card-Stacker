<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Stacker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --canvas: #d6d9dd;
        --space-12: 48px;
        --sans: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text",
          system-ui, sans-serif;

        /* card tokens (from Figma 1:7) */
        --card-bg: #1a1a1a;
        --card-radius: 16px;
        --card-pad: 12px;
        --card-gap: 12px;
        --card-img: 78px;
        --card-img-bg: rgba(186, 186, 186, 0.2);
        --card-img-radius: 8px;
        --card-title: #d2d2d2;
        --card-subtitle: #777;
      }

      * { box-sizing: border-box; }

      html, body, #root { height: 100%; }

      body {
        margin: 0;
        font-family: var(--sans);
        background: var(--canvas);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      /* ── Stage (Crypto glass widget BG) ───────────────────── */
      .stage {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: var(--space-12);
        position: relative;
        overflow: hidden;
        perspective: 1400px;
        perspective-origin: 50% 35%;
        background: radial-gradient(
            1200px 800px at 70% 20%,
            #e6e9ed 0%,
            transparent 60%
          ),
          radial-gradient(900px 700px at 20% 90%, #c9ccd1 0%, transparent 55%),
          var(--canvas);
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
            rgba(12, 15, 20, 0.045) 1px,
            transparent 1px
          );
        background-size: 24px 24px;
        mask-image: radial-gradient(
          ellipse at center,
          black 40%,
          transparent 80%
        );
        pointer-events: none;
      }

      /* ── Stack: vertical lineup of cards ────────────────────── */
      .stack {
        position: relative;
        width: 400px;
        height: 220px;
        transform-style: preserve-3d;
      }

      /* ── Card (matches Figma 1:7) ─────────────────────────── */
      /* Children are absolutely positioned so we can fluidly morph
         from a row layout (image left, text right) to a column layout
         (image on top, text below) when the card is selected. */
      .card {
        position: absolute;
        top: 50%;
        left: 50%;
        margin-top: -51px;   /* half of 102 (collapsed card height) */
        margin-left: -200px; /* half of 400 (card width) */
        width: 400px;
        height: 102px;
        /* Floor the bouncy shrink at the resting height so there's always
           room for the image inside its 12px padding — otherwise the card
           overshoots smaller than the image and the image pokes out. */
        min-height: 102px;
        background: var(--card-bg);
        border-radius: var(--card-radius);
        /* Clip any momentary overshoot of the inner image to the card's
           rounded bounds so the image can bounce in sync without poking out. */
        overflow: hidden;
        transform: translate3d(0, var(--ty), 0);
        transform-origin: 50% 100%;
        /* Transform and height share the same duration + easing so the
           card grows as one unified gesture instead of two staggered ones. */
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                    height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                    box-shadow 0.18s ease-out,
                    background 0.18s ease-out,
                    opacity 0.3s ease-out;
        will-change: transform;
        cursor: pointer;
        z-index: var(--z);
        box-shadow:
          0 24px 60px -20px rgba(8, 10, 14, 0.55),
          0 8px 24px -10px rgba(8, 10, 14, 0.35);
      }

      /* Selected: non-pressed cards slide left and tuck against the left
         edge of the viewport at full opacity (no fade). The calc anchors
         their center 250px from the viewport's left edge — card extends
         from 50px to 450px in, leaving a tidy margin. The Y uses
         var(--ty-left) so cards below the selected one shift up a slot
         to fill the gap, then animate back down on reset. */
      .stack.selected .card {
        transform: translate3d(calc(-50vw + 250px), var(--ty-left), 0) rotate(0deg);
        pointer-events: none;
        transition-duration: 0.5s, 0.55s, 0.18s, 0.18s, 0s;
      }

      /* Selected card: slide up and morph taller in one motion. No
         delays anywhere on the selected card so transform, height,
         image scale and text all kick off in the same frame. */
      .stack.selected .card.is-selected {
        transform: translate3d(0, var(--top-ty), 0) rotate(0deg);
        height: 680px;
        opacity: 1;
        pointer-events: auto;
        transition-delay: 0s, 0s, 0s, 0s, 0s;
        transition-duration: 0.4s, 0.4s, 0.18s, 0.18s, 0s;
        box-shadow:
          0 24px 60px -20px rgba(8, 10, 14, 0.55),
          0 8px 24px -10px rgba(8, 10, 14, 0.35);
      }

      /* Hover: card surface brightens. */
      .card:hover {
        background: #262626;
      }

      /* Image element is its full 376×376 size and we scale it DOWN
         for the collapsed state. Rendering at native resolution avoids
         the blur (and extra GPU upscale work) of growing a tiny raster
         up to 4.82× its size. Border-radius is inverse-scaled so the
         visible rounding stays ~8px in both states. */
      .card-img {
        position: absolute;
        top: 12px;
        left: 12px;
        width: 376px;
        height: 376px;
        border-radius: 38.6px;
        background: var(--card-img-bg);
        object-fit: cover;
        display: block;
        z-index: 1;
        transform: scale(0.2074);
        transform-origin: top left;
        will-change: transform;
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                    border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* Text path is split across two nested elements so the Y axis
         and X axis can be choreographed independently. The visual
         result is a curved path "around" the image instead of a
         straight diagonal that would cut underneath it. */
      .card-text {
        position: absolute;
        top: 400px;
        left: 12px;
        width: 376px;
        /* Outer wrapper owns vertical motion. */
        transform: translate3d(0, -375px, 0);
        will-change: transform;
        transition: transform 0.38s cubic-bezier(0.34, 1.2, 0.64, 1);
      }

      .card-text-inner {
        display: flex;
        flex-direction: column;
        gap: 4px;
        /* Inner owns horizontal motion. */
        transform: translate3d(90px, 0, 0);
        will-change: transform;
        transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
      }

      /* Selected: image grows to 376×376 in lock-step with the card
         and text, no hard delay. The S-curve easing holds the image
         small at the very start of the animation (giving the text Y
         a moment to drop below the image's growing footprint) and
         then sweeps it to full size, all inside the same window. */
      .stack.selected .card.is-selected .card-img {
        transform: scale(1);
        border-radius: 8px;
        transition-delay: 0s, 0s;
        transition-timing-function: cubic-bezier(0.7, 0, 0.3, 1);
      }

      /* Text Y drops immediately so it clears the image's growing
         footprint as one continuous motion with the card expanding. */
      .stack.selected .card.is-selected .card-text {
        transform: translate3d(0, 0, 0);
        transition-delay: 0s;
      }

      /* Text X slides left a hair after Y has begun, so the text path
         curves around the image's right edge instead of diagonally
         cutting through it. The delay is short enough that, paired
         with overlapping easings, it still reads as one fluid gesture. */
      .stack.selected .card.is-selected .card-text-inner {
        transform: translate3d(0, 0, 0);
        transition-delay: 0.1s;
      }

      .card-title {
        margin: 0;
        font-family: var(--sans);
        font-weight: 500;
        font-size: 18px;
        line-height: 27px;
        color: var(--card-title);
      }

      .card-subtitle {
        margin: 0;
        font-family: var(--sans);
        font-weight: 400;
        font-size: 14px;
        line-height: 21px;
        color: var(--card-subtitle);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
        }
      }
    </script>

    <script type="module">
      import React, { useState } from "react";
      import { createRoot } from "react-dom/client";

      const h = React.createElement;

      const CARDS = [
        // purple EVA-01 → lilac outline
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-01.jpg",        outline: "rgba(157, 102, 217, 0.95)" },
        // red EVA-02 → red outline
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-02.jpg",        outline: "rgba(228, 79, 64, 0.95)" },
        // pink chainsaw EVA-08 → deep pink outline
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-08.jpg",        outline: "rgba(224, 84, 150, 0.95)" },
        // blue Prototype EVA → blue outline
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-prototype.jpg", outline: "rgba(76, 122, 214, 0.95)" },
        // white/orange EVA-00 → burnt yellow outline
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-00.jpg",        outline: "rgba(214, 152, 53, 0.95)" },
        // black/red EVA Mark-06 → dark grey outline
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-mark-06.jpg",   outline: "rgba(96, 100, 112, 0.95)" },
      ];

      const N = CARDS.length;
      const CARD_H = 102;        // 78px image + 12px*2 padding
      const STACK_GAP = 12;      // vertical gap between cards in the lineup
      const ROW_PITCH = CARD_H + STACK_GAP;

      // Y-position of the top card; the selected card snaps here.
      const TOP_TY = (0 - (N - 1) / 2) * ROW_PITCH;

      function Card({ title, subtitle, img, i, isSelected, selectedIdx, onClick }) {
        // Top of array (i=0) gets lowest z; bottom (i=N-1) is highest and sits on top.
        // When a card is selected it must paint above the others as they exit.
        const z = isSelected ? N + 1 : i + 1;
        const ty = (i - (N - 1) / 2) * ROW_PITCH;
        // Cards below the selected one shift up by a slot to fill the gap
        // it left behind. Cards above the selection stay put.
        const shiftUp = selectedIdx !== null && !isSelected && i > selectedIdx;
        const tyLeft = shiftUp ? ty - ROW_PITCH : ty;

        return h(
          "article",
          {
            className: "card" + (isSelected ? " is-selected" : ""),
            onClick,
            style: {
              "--z": z,
              "--ty": ty + "px",
              "--ty-left": tyLeft + "px",
              "--top-ty": TOP_TY + "px",
            },
          },
          h("img", { className: "card-img", src: img, alt: "" }),
          h(
            "div",
            { className: "card-text" },
            h(
              "div",
              { className: "card-text-inner" },
              h("h3", { className: "card-title" }, title),
              h("p", { className: "card-subtitle" }, subtitle)
            )
          )
        );
      }

      // Default: vertical lineup. Click a card → others exit left, picked
      // card rides up to the top slot and morphs into a tall vertical layout.
      function App() {
        const [selected, setSelected] = useState(null);

        const reset = () => setSelected(null);

        return h(
          "div",
          {
            className: "stage",
            onClick: reset,
          },
          h(
            "div",
            { className: "stack" + (selected !== null ? " selected" : "") },
            CARDS.map((c, i) =>
              h(Card, {
                key: i,
                i,
                ...c,
                isSelected: selected === i,
                selectedIdx: selected,
                onClick: (e) => {
                  e.stopPropagation();
                  if (selected === null) setSelected(i);
                  else reset();
                },
              })
            )
          )
        );
      }

      createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
