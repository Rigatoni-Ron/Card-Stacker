<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Stacker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --canvas: #d6d9dd;
        --space-12: 48px;
        --sans: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text",
          system-ui, sans-serif;

        /* card tokens (from Figma 1:7) */
        --card-bg: #1a1a1a;
        --card-radius: 16px;
        --card-pad: 12px;
        --card-gap: 12px;
        --card-img: 78px;
        --card-img-bg: rgba(186, 186, 186, 0.2);
        --card-img-radius: 8px;
        --card-title: #d2d2d2;
        --card-subtitle: #777;
      }

      * { box-sizing: border-box; }

      html, body, #root { height: 100%; }

      body {
        margin: 0;
        font-family: var(--sans);
        background: var(--canvas);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      /* ── Stage (Crypto glass widget BG) ───────────────────── */
      .stage {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: var(--space-12);
        position: relative;
        overflow: hidden;
        perspective: 1400px;
        perspective-origin: 50% 35%;
        background: radial-gradient(
            1200px 800px at 70% 20%,
            #e6e9ed 0%,
            transparent 60%
          ),
          radial-gradient(900px 700px at 20% 90%, #c9ccd1 0%, transparent 55%),
          var(--canvas);
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
            rgba(12, 15, 20, 0.045) 1px,
            transparent 1px
          );
        background-size: 24px 24px;
        mask-image: radial-gradient(
          ellipse at center,
          black 40%,
          transparent 80%
        );
        pointer-events: none;
      }

      /* ── Stack: vertical lineup of cards ────────────────────── */
      .stack {
        position: relative;
        width: 400px;
        height: 220px;
        transform-style: preserve-3d;
      }

      /* ── Card (matches Figma 1:7) ─────────────────────────── */
      /* Children are absolutely positioned so we can fluidly morph
         from a row layout (image left, text right) to a column layout
         (image on top, text below) when the card is selected. */
      .card {
        position: absolute;
        top: 50%;
        left: 50%;
        margin-top: -51px;   /* half of 102 (collapsed card height) */
        margin-left: -200px; /* half of 400 (card width) */
        width: 400px;
        height: 102px;
        background: var(--card-bg);
        border-radius: var(--card-radius);
        transform: translate3d(0, var(--ty), 0);
        transform-origin: 50% 100%;
        transition: transform 0.75s cubic-bezier(0.22, 1, 0.36, 1),
                    height 0.7s cubic-bezier(0.22, 1, 0.36, 1),
                    box-shadow 0.18s ease-out,
                    background 0.18s ease-out,
                    opacity 0.45s ease-out;
        will-change: transform;
        cursor: pointer;
        z-index: var(--z);
        box-shadow:
          0 24px 60px -20px rgba(8, 10, 14, 0.55),
          0 8px 24px -10px rgba(8, 10, 14, 0.35);
      }

      /* Selected: non-pressed cards exit left, pressed card slides up to top slot. */
      .stack.selected .card {
        transform: translate3d(-720px, var(--ty), 0) rotate(0deg);
        opacity: 0;
        pointer-events: none;
        transition-duration: 0.6s, 0.7s, 0.18s, 0.18s, 0.45s;
      }

      /* Selected card: slide up and morph taller start together so the
         whole thing reads as one continuous motion. */
      .stack.selected .card.is-selected {
        transform: translate3d(0, var(--top-ty), 0) rotate(0deg);
        height: 680px;
        opacity: 1;
        pointer-events: auto;
        transition-delay: 0.3s, 0.3s, 0s, 0s, 0s;
        transition-duration: 0.9s, 0.9s, 0.18s, 0.18s, 0s;
        box-shadow:
          0 24px 60px -20px rgba(8, 10, 14, 0.55),
          0 8px 24px -10px rgba(8, 10, 14, 0.35);
      }

      /* Hover: card surface brightens. */
      .card:hover {
        background: #262626;
      }

      .card-img {
        position: absolute;
        top: 12px;
        left: 12px;
        width: var(--card-img);
        height: var(--card-img);
        border-radius: var(--card-img-radius);
        background: var(--card-img-bg);
        object-fit: cover;
        display: block;
        transition: top 0.75s cubic-bezier(0.22, 1, 0.36, 1),
                    left 0.75s cubic-bezier(0.22, 1, 0.36, 1),
                    width 0.75s cubic-bezier(0.22, 1, 0.36, 1),
                    height 0.75s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .card-text {
        position: absolute;
        top: 25px;
        left: 102px;
        right: 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        transition: top 0.75s cubic-bezier(0.22, 1, 0.36, 1),
                    left 0.75s cubic-bezier(0.22, 1, 0.36, 1),
                    right 0.75s cubic-bezier(0.22, 1, 0.36, 1);
      }

      /* Image grows to a full-width square at the top and the text slides
         beneath it — both kick off with the slide so the morph happens
         while the card is still travelling. */
      .stack.selected .card.is-selected .card-img {
        top: 12px;
        left: 12px;
        width: 376px;
        height: 376px;
        transition-delay: 0.3s, 0.3s, 0.3s, 0.3s;
        transition-duration: 0.9s, 0.9s, 0.9s, 0.9s;
      }

      .stack.selected .card.is-selected .card-text {
        top: 400px;
        left: 12px;
        right: 12px;
        transition-delay: 0.3s, 0.3s, 0.3s;
        transition-duration: 0.9s, 0.9s, 0.9s;
      }

      .card-title {
        margin: 0;
        font-family: var(--sans);
        font-weight: 500;
        font-size: 18px;
        line-height: 27px;
        color: var(--card-title);
      }

      .card-subtitle {
        margin: 0;
        font-family: var(--sans);
        font-weight: 400;
        font-size: 14px;
        line-height: 21px;
        color: var(--card-subtitle);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
        }
      }
    </script>

    <script type="module">
      import React, { useState } from "react";
      import { createRoot } from "react-dom/client";

      const h = React.createElement;

      const CARDS = [
        // purple EVA-01 → lilac outline
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-01.jpg",        outline: "rgba(157, 102, 217, 0.95)" },
        // red EVA-02 → red outline
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-02.jpg",        outline: "rgba(228, 79, 64, 0.95)" },
        // pink chainsaw EVA-08 → deep pink outline
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-08.jpg",        outline: "rgba(224, 84, 150, 0.95)" },
        // blue Prototype EVA → blue outline
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-prototype.jpg", outline: "rgba(76, 122, 214, 0.95)" },
        // white/orange EVA-00 → burnt yellow outline
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-00.jpg",        outline: "rgba(214, 152, 53, 0.95)" },
        // black/red EVA Mark-06 → dark grey outline
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-mark-06.jpg",   outline: "rgba(96, 100, 112, 0.95)" },
      ];

      const N = CARDS.length;
      const CARD_H = 102;        // 78px image + 12px*2 padding
      const STACK_GAP = 12;      // vertical gap between cards in the lineup
      const ROW_PITCH = CARD_H + STACK_GAP;

      // Y-position of the top card; the selected card snaps here.
      const TOP_TY = (0 - (N - 1) / 2) * ROW_PITCH;

      function Card({ title, subtitle, img, i, isSelected, onClick }) {
        // Top of array (i=0) gets lowest z; bottom (i=N-1) is highest and sits on top.
        // When a card is selected it must paint above the others as they exit.
        const z = isSelected ? N + 1 : i + 1;
        const ty = (i - (N - 1) / 2) * ROW_PITCH;

        return h(
          "article",
          {
            className: "card" + (isSelected ? " is-selected" : ""),
            onClick,
            style: {
              "--z": z,
              "--ty": ty + "px",
              "--top-ty": TOP_TY + "px",
            },
          },
          h("img", { className: "card-img", src: img, alt: "" }),
          h(
            "div",
            { className: "card-text" },
            h("h3", { className: "card-title" }, title),
            h("p", { className: "card-subtitle" }, subtitle)
          )
        );
      }

      // Default: vertical lineup. Click a card → others exit left, picked
      // card rides up to the top slot and morphs into a tall vertical layout.
      function App() {
        const [selected, setSelected] = useState(null);

        const reset = () => setSelected(null);

        return h(
          "div",
          {
            className: "stage",
            onClick: reset,
          },
          h(
            "div",
            { className: "stack" + (selected !== null ? " selected" : "") },
            CARDS.map((c, i) =>
              h(Card, {
                key: i,
                i,
                ...c,
                isSelected: selected === i,
                onClick: (e) => {
                  e.stopPropagation();
                  if (selected === null) setSelected(i);
                  else reset();
                },
              })
            )
          )
        );
      }

      createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
