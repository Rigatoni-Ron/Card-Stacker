<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Stacker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --canvas: #d6d9dd;
        --space-12: 48px;
        --sans: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text",
          system-ui, sans-serif;

        /* card tokens (from Figma 1:7) */
        --card-bg: #1a1a1a;
        --card-radius: 16px;
        --card-pad: 12px;
        --card-gap: 12px;
        --card-img: 78px;
        --card-img-bg: rgba(186, 186, 186, 0.2);
        --card-img-radius: 8px;
        --card-title: #d2d2d2;
        --card-subtitle: #777;
      }

      * { box-sizing: border-box; }

      html, body, #root { height: 100%; }

      body {
        margin: 0;
        font-family: var(--sans);
        background: var(--canvas);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      /* ── Stage (Crypto glass widget BG) ───────────────────── */
      .stage {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: var(--space-12);
        position: relative;
        overflow: hidden;
        perspective: 1400px;
        perspective-origin: 50% 35%;
        background: radial-gradient(
            1200px 800px at 70% 20%,
            #e6e9ed 0%,
            transparent 60%
          ),
          radial-gradient(900px 700px at 20% 90%, #c9ccd1 0%, transparent 55%),
          var(--canvas);
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
            rgba(12, 15, 20, 0.045) 1px,
            transparent 1px
          );
        background-size: 24px 24px;
        mask-image: radial-gradient(
          ellipse at center,
          black 40%,
          transparent 80%
        );
        pointer-events: none;
      }

      /* ── Stack: messy pile by default; cleans up into a fan on click ── */
      .stack {
        position: relative;
        width: 400px;
        height: 220px;
        transform-style: preserve-3d;
      }

      /* ── Card (matches Figma 1:7) ─────────────────────────── */
      .card {
        position: absolute;
        top: 50%;
        left: 50%;
        margin-top: -51px;   /* half of 102 (card height) */
        margin-left: -200px; /* half of 400 (card width) */
        width: 400px;
        background: var(--card-bg);
        border-radius: var(--card-radius);
        padding: var(--card-pad);
        display: flex;
        gap: var(--card-gap);
        align-items: center;
        transform: translate3d(var(--mx), var(--my), 0) rotate(var(--mrot));
        transform-origin: 50% 100%;
        transition: transform 0.75s cubic-bezier(0.22, 1, 0.36, 1),
                    box-shadow 0.45s cubic-bezier(0.22, 1, 0.36, 1),
                    filter 0.3s ease;
        will-change: transform;
        cursor: pointer;
        z-index: var(--z);
        box-shadow:
          0 14px 32px -12px rgba(8, 10, 14, 0.55),
          0 5px 14px -6px rgba(8, 10, 14, 0.35);
      }

      /* Fanned: cards fan from a shared bottom pivot, like a hand of cards */
      .stack.spread .card {
        transform: translate3d(var(--tx), var(--ty), 0) rotate(var(--rot));
        box-shadow:
          0 24px 60px -20px rgba(8, 10, 14, 0.55),
          0 8px 24px -10px rgba(8, 10, 14, 0.35);
      }

      /* Subtle hover only in the clean lineup: brighten + thin outline */
      .stack.spread .card:hover {
        filter: brightness(1.08);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.22),
          0 28px 64px -18px rgba(8, 10, 14, 0.6),
          0 10px 26px -10px rgba(8, 10, 14, 0.4);
      }

      .card-img {
        width: var(--card-img);
        height: var(--card-img);
        border-radius: var(--card-img-radius);
        background: var(--card-img-bg);
        flex-shrink: 0;
        object-fit: cover;
        display: block;
      }

      .card-text {
        flex: 1 0 0;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .card-title {
        margin: 0;
        font-family: var(--sans);
        font-weight: 500;
        font-size: 18px;
        line-height: 27px;
        color: var(--card-title);
      }

      .card-subtitle {
        margin: 0;
        font-family: var(--sans);
        font-weight: 400;
        font-size: 14px;
        line-height: 21px;
        color: var(--card-subtitle);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
        }
      }
    </script>

    <script type="module">
      import React, { useState } from "react";
      import { createRoot } from "react-dom/client";

      const h = React.createElement;

      const CARDS = [
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-01.jpg" },
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-02.jpg" },
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-prototype.jpg" },
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-00.jpg" },
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-08.jpg" },
        { title: "Header of card", subtitle: "Subtitle", img: "images/eva-mark-06.jpg" },
      ];

      const N = CARDS.length;
      const CARD_H = 102;        // 78px image + 12px*2 padding
      const STACK_GAP = 12;      // vertical gap between cards in the clean lineup
      const ROW_PITCH = CARD_H + STACK_GAP;

      // Per-card offsets for the messy pile (hand-tuned to look thrown-down).
      const MESSY = [
        { mx: -56, my: -28, mrot: -15 },
        { mx:  44, my: -38, mrot:  11 },
        { mx: -22, my:  18, mrot:  -6 },
        { mx:  36, my:  30, mrot:  14 },
        { mx: -68, my:   8, mrot:  17 },
        { mx:  18, my: -10, mrot:  -9 },
      ];

      function Card({ title, subtitle, img, i, onClick }) {
        // Top of array (i=0) gets lowest z; bottom (i=N-1) is highest and sits on top.
        const z = i + 1;
        // Clean lineup: cards stack vertically around the centerline, no rotation.
        const tx = 0;
        const ty = (i - (N - 1) / 2) * ROW_PITCH;
        const rot = 0;
        const m = MESSY[i] || { mx: 0, my: 0, mrot: 0 };

        return h(
          "article",
          {
            className: "card",
            onClick,
            style: {
              "--z": z,
              "--mx": m.mx + "px",
              "--my": m.my + "px",
              "--mrot": m.mrot + "deg",
              "--tx": tx + "px",
              "--ty": ty + "px",
              "--rot": rot + "deg",
            },
          },
          h("img", { className: "card-img", src: img, alt: "" }),
          h(
            "div",
            { className: "card-text" },
            h("h3", { className: "card-title" }, title),
            h("p", { className: "card-subtitle" }, subtitle)
          )
        );
      }

      function App() {
        const [spread, setSpread] = useState(false);

        return h(
          "div",
          {
            className: "stage",
            onClick: () => setSpread(false),
          },
          h(
            "div",
            { className: "stack" + (spread ? " spread" : "") },
            CARDS.map((c, i) =>
              h(Card, {
                key: i,
                i,
                ...c,
                onClick: (e) => {
                  e.stopPropagation();
                  setSpread((s) => !s);
                },
              })
            )
          )
        );
      }

      createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
